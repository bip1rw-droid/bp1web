async function fbGuardar(col,datos){try{await window._db.collection("bp1").doc(col).set(datos);}catch(e){console.error(e);}}
async function fbLeer(col){try{const s=await window._db.collection("bp1").doc(col).get();return s.exists?s.data():null;}catch(e){return null;}}

function ordenarEventos(evs){
  return [...evs].sort((a,b)=>{
    const ma=MESES_ORDEN.indexOf(a.mes.toUpperCase());
    const mb=MESES_ORDEN.indexOf(b.mes.toUpperCase());
    if(ma!==mb)return ma-mb;
    return (parseInt(a.dia)||0)-(parseInt(b.dia)||0);
  });
}
function useInView(ref){
  const [v,setV]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:0.1});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return v;
}
function Section({id,children,bg="#fff"}){
  const ref=useRef();const v=useInView(ref);
  return(<section id={id} ref={ref} style={{background:bg,padding:"60px 20px",opacity:v?1:0,transform:v?"translateY(0)":"translateY(40px)",transition:"opacity 0.7s ease,transform 0.7s ease"}}><div style={{maxWidth:1000,margin:"0 auto"}}>{children}</div></section>);
}

function Repositorio(){
  const [catAbierta,setCatAbierta]=useState(null);

  const [cargandoCat,setCargandoCat]=useState({});
  const [docActivo,setDocActivo]=useState(null);

  const abrirCat=async(cat)=>{
    if(catAbierta===cat){setCatAbierta(null);setDocActivo(null);return;}
    setCatAbierta(cat);setDocActivo(null);
    if(docsPorCat[cat]!==undefined)return;
    setCargandoCat(p=>({...p,[cat]:true}));
    const carpeta=REPO_CATS[cat];
    try{
      const r=await fetch(`https://api.github.com/repos/bip1rw-droid/Respositorio-digital/contents/${carpeta}`);
      const data=await r.json();
      if(Array.isArray(data)){
        setDocsPorCat(p=>({...p,[cat]:data.filter(f=>f.name.toLowerCase().endsWith(".pdf")).map((f,i)=>({id:i,titulo:f.name.replace(".pdf","").replace(/_/g," "),url:f.download_url}))}));
      } else {
        setDocsPorCat(p=>({...p,[cat]:[]}));
      }
    }catch{setDocsPorCat(p=>({...p,[cat]:[]}));}
    setCargandoCat(p=>({...p,[cat]:false}));
  };

  return(<div>
    <p style={{textAlign:"center",color:"#666",marginBottom:28,fontSize:15}}>Seleccioná una categoría para ver los documentos disponibles.</p>

              <span style={{fontWeight:800,fontSize:16,color:abierta?"#fff":C.dark}}>{cat}</span>

            {!cargando&&docs.length>0&&!docActivo&&(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
              {docs.map(doc=>(<div key={doc.id} style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderLeft:`4px solid ${col}`,transition:"transform 0.2s"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-3px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
